<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/qslzgTU.png" />
    <link rel="apple-touch-icon" href="https://i.imgur.com/qslzgTU.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GMG U" />
    <title>GMG University | Lane-Pierce Fellowship</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{background:#0a0a0f;min-height:100vh;-webkit-font-smoothing:antialiased;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
      .aba-load{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
      .aba-energy{width:70px;height:70px;position:relative}
      .aba-energy::before,.aba-energy::after{content:'';position:absolute;inset:0;border-radius:42% 58% 55% 45% / 48% 42% 58% 52%;animation:morph 4s ease-in-out infinite}
      .aba-energy::before{background:linear-gradient(135deg,rgba(139,92,246,.8),rgba(236,72,153,.6),rgba(99,102,241,.7));filter:blur(1px);box-shadow:0 0 30px rgba(139,92,246,.4),0 0 60px rgba(236,72,153,.2)}
      .aba-energy::after{background:linear-gradient(225deg,rgba(167,139,250,.6),rgba(45,212,191,.4),rgba(132,204,22,.3));filter:blur(2px);animation-delay:-2s;mix-blend-mode:screen}
      @keyframes morph{0%,100%{border-radius:42% 58% 55% 45%/48% 42% 58% 52%}25%{border-radius:55% 45% 40% 60%/60% 35% 65% 40%}50%{border-radius:38% 62% 58% 42%/45% 55% 45% 55%}75%{border-radius:60% 40% 45% 55%/38% 62% 42% 58%}}
      .aba-load-text{margin-top:20px;color:rgba(167,139,250,.5);font-size:13px;letter-spacing:.5px}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="aba-load">
        <div class="aba-energy"></div>
        <p class="aba-load-text">GMG University</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
